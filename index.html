<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚽ 足球小将训练助手</title>
<style>
/* ═══════════════════════════════════════════
   CSS Variables
═══════════════════════════════════════════ */
:root{
  --green:#2DC653;--green-dark:#1FA83C;--green-light:#E8F9EC;
  --blue:#4CC9F0;--blue-dark:#1E8BC3;--blue-light:#E0F6FF;
  --yellow:#FFD60A;--orange:#FF9F1C;--red:#FF4D6D;
  --bg:#F5F7FA;--bg-card:#FFFFFF;--text:#1A1A2E;--text-dim:#6B7280;
  --shadow:0 4px 20px rgba(0,0,0,0.08);--radius:20px;
  --font:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  --header-h:120px;
  --nav-h:64px;
}
[data-theme="dark"]{
  --bg:#1A1A2E;--bg-card:#252540;--text:#F0F0F5;--text-dim:#9CA3AF;
  --shadow:0 4px 20px rgba(0,0,0,0.4);--green-light:#1A3A2A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ═══════════════════════════════════════════
   Layout Root
═══════════════════════════════════════════ */
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  transition:background .3s,color .3s;user-select:none;
  display:flex;flex-direction:column;height:100dvh;
}

/* ═══════════════════════════════════════════
   Header
═══════════════════════════════════════════ */
header{
  background:var(--green);
  flex-shrink:0;
  position:sticky;
  top:0;
  z-index:50;
}
.header-inner{
  padding:10px 14px 0;
}
.header-top{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
}
h1{font-size:16px;font-weight:700;color:#fff;letter-spacing:.3px}
.header-controls{display:flex;align-items:center;gap:6px}
.streak-badge{
  background:rgba(255,255,255,0.22);color:#fff;padding:4px 10px;
  border-radius:999px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px;
}
.streak-badge svg{width:12px;height:12px;fill:#FFD60A}
.dark-toggle{
  background:rgba(255,255,255,0.2);border:none;border-radius:999px;
  padding:6px 10px;font-size:12px;cursor:pointer;color:#fff;
  display:flex;align-items:center;gap:4px;transition:background .2s;
}
.dark-toggle:active{background:rgba(255,255,255,0.3)}
.dark-toggle svg{width:14px;height:14px;fill:currentColor;stroke:none}

/* ── Tab Bar ─────────────────────────────── */
.main-tabs{
  display:flex;gap:3px;
  padding-bottom:10px;
}
.tab-btn{
  flex:1;padding:8px 4px;border:none;border-radius:12px 12px 0 0;
  background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);
  font-size:11px;font-weight:600;cursor:pointer;transition:.2s;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.tab-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tab-btn.active{background:#fff;color:var(--green)}

/* ═══════════════════════════════════════════
   Page Container
═══════════════════════════════════════════ */
.page-wrap{flex:1;overflow:hidden;position:relative}
.page{
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  padding:calc(var(--header-h) + 14px) 14px calc(var(--nav-h) + 14px);
  display:none;scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
.page.active{display:block}

/* ═══════════════════════════════════════════
   Cards
═══════════════════════════════════════════ */
.card{
  background:var(--bg-card);border-radius:var(--radius);
  padding:16px;margin-bottom:12px;
  box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.card-title{
  font-size:12px;font-weight:700;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;
}

/* ═══════════════════════════════════════════
   Timer Card (Train Page)
═══════════════════════════════════════════ */
.timer-card{
  background:linear-gradient(135deg,var(--green) 0%,#1DB954 100%);
  color:#fff;text-align:center;padding:16px 14px;border-radius:var(--radius);
  position:relative;overflow:hidden;
}
.timer-card::before{
  content:'';position:absolute;top:-30px;right:-30px;
  width:100px;height:100px;background:rgba(255,255,255,0.1);border-radius:50%;
}
.timer-time{
  font-size:44px;font-weight:800;letter-spacing:-1px;
  font-variant-numeric:tabular-nums;line-height:1;
  margin:6px 0 10px;text-shadow:0 2px 8px rgba(0,0,0,0.15);
}
.timer-sub{font-size:12px;opacity:.85;margin-bottom:12px}
.btn-start{
  background:#fff;color:var(--green);border:none;
  width:100%;padding:14px;border-radius:999px;font-size:16px;font-weight:800;
  cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.15);
  transition:transform .15s,box-shadow .15s;
}
.btn-start:active{transform:scale(.97)}
.btn-start.running{background:rgba(255,255,255,0.2);color:#fff}
.session-counts{
  display:flex;overflow-x:auto;gap:5px;
  margin-top:10px;padding:4px 0;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
}
.session-counts::-webkit-scrollbar{display:none}
.count-chip{
  background:rgba(255,255,255,0.2);border-radius:10px;
  padding:7px 9px;text-align:center;flex-shrink:0;scroll-snap-align:start;
}
.count-chip .c-num{font-size:18px;font-weight:800;display:block;line-height:1}
.count-chip .c-label{font-size:9px;opacity:.85;margin-top:2px;display:block}

/* ═══════════════════════════════════════════
   Training Items
═══════════════════════════════════════════ */
.items-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:12px;
}
.train-item{
  background:var(--bg-card);border-radius:var(--radius);
  border:2.5px solid transparent;padding:16px 12px 14px;
  cursor:pointer;transition:transform .12s,border-color .15s;
  box-shadow:var(--shadow);position:relative;
  display:flex;flex-direction:column;align-items:center;text-align:center;
  min-height:110px;justify-content:center;
}
.train-item:active{transform:scale(.96)}
.train-item.active{border-color:var(--green);background:var(--green-light)}
.train-item .item-icon{font-size:34px;display:block;margin-bottom:5px}
.train-item .item-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px}
.train-item .item-count{font-size:28px;font-weight:900;color:var(--green);line-height:1}
.train-item .item-count.zero{color:var(--text-dim);opacity:.4}
.train-item .add-btn{
  position:absolute;top:8px;right:8px;
  width:30px;height:30px;border-radius:50%;border:none;
  background:var(--green);color:#fff;font-size:18px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(45,198,83,0.35);
  line-height:1;
}
.train-item .add-btn:active{transform:scale(.85)}
.train-tip{
  text-align:center;margin-top:12px;font-size:12px;color:var(--text-dim);
}

/* ═══════════════════════════════════════════
   Page Header (History/Badges/Stats)
═══════════════════════════════════════════ */
.page-title-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;flex-wrap:wrap;gap:8px;
}
.page-title-row h2{font-size:18px;font-weight:900;color:var(--text)}

/* ═══════════════════════════════════════════
   Calendar
═══════════════════════════════════════════ */
.cal-week-nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
  gap:8px;
}
.cal-week-nav button{
  background:none;border:none;font-size:28px;cursor:pointer;
  color:var(--green);padding:8px 14px;border-radius:12px;
  line-height:1;min-width:52px;min-height:44px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.cal-week-nav button:active{background:var(--green-light)}
.cal-week-label{font-size:12px;font-weight:700;color:var(--text)}
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:3px;
}
.cal-head{
  text-align:center;font-size:10px;font-weight:700;
  color:var(--text-dim);padding-bottom:6px;
}
.cal-day{
  aspect-ratio:1;border-radius:8px;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;gap:1px;transition:background .15s;
}
.cal-day .cd-num{line-height:1}
.cal-day .cd-dot{width:4px;height:4px;border-radius:50%;background:var(--green);display:none}
.cal-day.has-train{background:var(--green-light);color:var(--green)}
.cal-day.has-train .cd-dot{display:block}
.cal-day.today{background:var(--blue-light);color:var(--blue-dark)}
.cal-day.today .cd-dot{background:var(--blue)}
.cal-day.future{opacity:.3}
.cal-day.empty{background:rgba(0,0,0,0.03)}

/* ── Day Detail ──────────────────────────── */
.day-detail{margin-top:12px}
.day-stat-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid rgba(0,0,0,0.05);
}
.day-stat-row:last-child{border-bottom:none}
.day-stat-row .dsr-label{font-size:13px;color:var(--text-dim);display:flex;align-items:center;gap:8px}
.day-stat-row .dsr-val{font-size:15px;font-weight:800;color:var(--text)}
.day-stat-row .dsr-icon{font-size:16px}

/* ═══════════════════════════════════════════
   Badges
═══════════════════════════════════════════ */
.badge-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.badge-card{
  background:var(--bg-card);border-radius:var(--radius);
  padding:14px 10px;text-align:center;
  border:2px solid rgba(0,0,0,0.05);transition:transform .15s;
  position:relative;
}
.badge-card.earned{border-color:var(--yellow)}
.badge-card.locked{opacity:.45;filter:grayscale(1)}
.badge-card .badge-icon{font-size:36px;display:block;margin-bottom:6px}
.badge-card .badge-name{font-size:12px;font-weight:800;color:var(--text);margin-bottom:3px;display:block}
.badge-card .badge-desc{font-size:10px;color:var(--text-dim);line-height:1.4;display:block}
.badge-card .badge-lock{position:absolute;top:6px;right:8px;font-size:12px;opacity:.4}
.badge-progress{font-size:12px;color:var(--text-dim);font-weight:600}

/* ═══════════════════════════════════════════
   Stats
═══════════════════════════════════════════ */
.stats-hero{
  background:linear-gradient(135deg,var(--green) 0%,#1DB954 100%);
  color:#fff;border-radius:var(--radius);padding:18px 16px;text-align:center;
  margin-bottom:12px;position:relative;overflow:hidden;
}
.stats-hero::before{
  content:'';position:absolute;top:-30px;right:-30px;
  width:120px;height:120px;background:rgba(255,255,255,0.1);border-radius:50%;
}
.stats-hero-label{font-size:12px;font-weight:700;opacity:.9}
.stats-hero-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;
}
.stat-box{
  background:rgba(255,255,255,0.18);border-radius:12px;padding:10px 8px;text-align:center;
}
.stat-box .s-val{font-size:24px;font-weight:900;line-height:1;display:block}
.stat-box .s-lbl{font-size:10px;opacity:.85;margin-top:3px;display:block}

.rank-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.04);
}
.rank-row:last-child{border-bottom:none}
.rank-num{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;flex-shrink:0;
}
.rank-num.r1{background:#FFD60A;color:#1A1A2E}
.rank-num.r2{background:#C8C8C8;color:#1A1A2E}
.rank-num.r3{background:#CD7F32;color:#fff}
.rank-num.rn{background:var(--bg);color:var(--text-dim)}
.rank-emoji{font-size:20px}
.rank-info{flex:1}
.rank-name{font-size:13px;font-weight:700;color:var(--text)}
.rank-count{font-size:11px;color:var(--text-dim);margin-top:1px}
.rank-bar-wrap{flex:1;display:flex;align-items:center}
.rank-bar-fill{height:6px;border-radius:999px;background:var(--green);width:0;transition:width .4s ease}

.btn-export{
  width:100%;background:var(--green);color:#fff;border:none;
  padding:13px;border-radius:999px;font-size:14px;font-weight:800;
  cursor:pointer;margin-top:6px;transition:background .15s;
}
.btn-export:active{background:var(--green-dark)}

/* ═══════════════════════════════════════════
   Bottom Nav
═══════════════════════════════════════════ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg-card);
  border-top:1px solid rgba(0,0,0,0.06);
  display:flex;padding:6px 12px env(safe-area-inset-bottom,6px);
  z-index:100;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  height:var(--nav-h);align-items:center;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:2px;padding:4px;border:none;background:none;
  cursor:pointer;color:var(--text-dim);transition:color .2s;
}
.nav-item svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-item span{font-size:9px;font-weight:600}
.nav-item.active{color:var(--green)}

/* ═══════════════════════════════════════════
   Toast
═══════════════════════════════════════════ */
.toast{
  position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-16px);
  background:#1A1A2E;color:#fff;padding:10px 20px;
  border-radius:999px;font-size:13px;font-weight:700;z-index:200;
  opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.green{background:var(--green)}
.toast.gold{background:var(--yellow);color:#1A1A2E}

/* ═══════════════════════════════════════════
   Animations
═══════════════════════════════════════════ */
@keyframes bounce{0%,100%{transform:scale(1)}40%{transform:scale(1.22)}60%{transform:scale(.94)} }
@keyframes pop{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1} }
.bounce{animation:bounce .3s ease}
.pop{animation:pop .4s ease}

/* ═══════════════════════════════════════════
   Empty State
═══════════════════════════════════════════ */
.empty-state{text-align:center;padding:24px 12px;color:var(--text-dim)}
.empty-state .es-icon{font-size:42px;display:block;margin-bottom:10px;opacity:.45}
.empty-state p{font-size:13px;line-height:1.6}

/* ═══════════════════════════════════════════
   Responsive — Tablet & Desktop (≥600px)
═══════════════════════════════════════════ */
@media (min-width:600px){
  :root{--header-h:100px;--nav-h:68px}

  .header-inner{padding:14px 24px 0}
  h1{font-size:20px}
  .streak-badge{font-size:13px;padding:5px 12px}
  .streak-badge svg{width:14px;height:14px}
  .dark-toggle{padding:7px 14px;font-size:13px}
  .main-tabs{gap:5px}
  .tab-btn{
    flex-direction:row;justify-content:center;
    padding:10px 16px;font-size:13px;border-radius:14px 14px 0 0;gap:8px;
  }
  .tab-btn svg{width:20px;height:20px}

  .page{padding:20px 20px calc(var(--nav-h) + 20px)}
  .card{padding:20px;margin-bottom:16px}
  .card-title{font-size:13px;margin-bottom:12px}

  .timer-card{padding:24px 20px}
  .timer-time{font-size:56px;margin:8px 0 14px}
  .timer-sub{font-size:14px}
  .btn-start{font-size:18px;padding:15px}
  .session-counts{gap:8px;margin-top:14px}
  .count-chip .c-num{font-size:22px}
  .count-chip .c-label{font-size:11px}

  .items-grid{grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px}
  .train-item{min-height:130px;padding:20px 16px 18px}
  .train-item .item-icon{font-size:42px}
  .train-item .item-name{font-size:14px}
  .train-item .item-count{font-size:34px}
  .train-item .add-btn{width:36px;height:36px;font-size:22px;top:12px;right:12px}
  .train-tip{margin-top:14px;font-size:13px}

  .page-title-row{margin-bottom:16px}
  .page-title-row h2{font-size:22px}

  .cal-week-nav{margin-bottom:14px}
  .cal-week-label{font-size:14px}
  .cal-grid{gap:5px}
  .cal-head{padding-bottom:8px;font-size:12px}
  .cal-day{font-size:15px;border-radius:10px}
  .cal-day .cd-dot{width:5px;height:5px}
  .day-detail{margin-top:16px}

  .badge-grid{grid-template-columns:repeat(3,1fr);gap:14px}
  .badge-card{padding:18px 14px}
  .badge-card .badge-icon{font-size:44px;margin-bottom:8px}
  .badge-card .badge-name{font-size:13px}
  .badge-card .badge-desc{font-size:11px}
  .badge-progress{font-size:13px}

  .stats-hero{padding:24px 20px;margin-bottom:16px}
  .stats-hero-label{font-size:14px}
  .stats-hero-grid{grid-template-columns:repeat(4,1fr);gap:10px}
  .stat-box .s-val{font-size:28px}
  .stat-box .s-lbl{font-size:12px}

  .rank-row{padding:12px 0}
  .rank-num{width:30px;height:30px;font-size:13px}
  .rank-emoji{font-size:24px}
  .rank-name{font-size:14px}
  .rank-count{font-size:12px}
  .rank-bar-fill{height:8px}
  .btn-export{font-size:15px;padding:14px}
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     Header
═══════════════════════════════════════════ -->
<header>
  <div class="header-inner">
    <div class="header-top">
      <h1>⚽ 足球小将</h1>
      <div class="header-controls">
        <button class="dark-toggle" onclick="toggleDark()" aria-label="深色模式">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <div class="streak-badge" id="streakBadge">
          <svg viewBox="0 0 24 24"><path d="M12 2C8 7 4 9 4 13a8 8 0 0016 0c0-4-4-6-8-11z"/></svg>
          <span id="streakNum">0</span>天
        </div>
      </div>
    </div>
    <div class="main-tabs">
      <button class="tab-btn active" data-page="train" onclick="switchTab('train')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        训练
      </button>
      <button class="tab-btn" data-page="history" onclick="switchTab('history')">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        历史
      </button>
      <button class="tab-btn" data-page="badges" onclick="switchTab('badges')">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        徽章
      </button>
      <button class="tab-btn" data-page="stats" onclick="switchTab('stats')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        统计
      </button>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════════════════
     Page: Train
═══════════════════════════════════════════ -->
<div class="page active" id="page-train">
  <div class="timer-card">
    <div class="timer-sub" id="timerLabel">点击按钮，计时本次训练</div>
    <div class="timer-time" id="timerDisplay">00:00</div>
    <button class="btn-start" id="btnStart" onclick="toggleTimer()">⚡ 开始训练</button>
    <div class="session-counts" id="sessionCounts">
      <div class="count-chip"><span class="c-num" id="sc-shoot">0</span><span class="c-label">射门</span></div>
      <div class="count-chip"><span class="c-num" id="sc-pass">0</span><span class="c-label">传球</span></div>
      <div class="count-chip"><span class="c-num" id="sc-dribble">0</span><span class="c-label">带球</span></div>
      <div class="count-chip"><span class="c-num" id="sc-catch">0</span><span class="c-label">接球</span></div>
      <div class="count-chip"><span class="c-num" id="sc-header">0</span><span class="c-label">头球</span></div>
    </div>
  </div>

  <div class="items-grid">
    <div class="train-item" onclick="addCount('shoot')">
      <button class="add-btn" onclick="event.stopPropagation();addCount('shoot')">+</button>
      <span class="item-icon">⚽</span>
      <span class="item-name">射门</span>
      <span class="item-count zero" id="cnt-shoot">0</span>
    </div>
    <div class="train-item" onclick="addCount('pass')">
      <button class="add-btn" onclick="event.stopPropagation();addCount('pass')">+</button>
      <span class="item-icon">🎯</span>
      <span class="item-name">传球</span>
      <span class="item-count zero" id="cnt-pass">0</span>
    </div>
    <div class="train-item" onclick="addCount('dribble')">
      <button class="add-btn" onclick="event.stopPropagation();addCount('dribble')">+</button>
      <span class="item-icon">🏃</span>
      <span class="item-name">带球绕桩</span>
      <span class="item-count zero" id="cnt-dribble">0</span>
    </div>
    <div class="train-item" onclick="addCount('catch')">
      <button class="add-btn" onclick="event.stopPropagation();addCount('catch')">+</button>
      <span class="item-icon">🧤</span>
      <span class="item-name">接球</span>
      <span class="item-count zero" id="cnt-catch">0</span>
    </div>
    <div class="train-item" onclick="addCount('header')">
      <button class="add-btn" onclick="event.stopPropagation();addCount('header')">+</button>
      <span class="item-icon">🗣</span>
      <span class="item-name">头球</span>
      <span class="item-count zero" id="cnt-header">0</span>
    </div>
  </div>

  <div class="train-tip">点击卡片或 + 按钮记录次数</div>
</div>

<!-- ═══════════════════════════════════════════
     Page: History
═══════════════════════════════════════════ -->
<div class="page" id="page-history">
  <div class="page-title-row">
    <h2>📅 训练历史</h2>
    <div class="cal-week-nav">
      <button onclick="changeWeek(-1)">&lsaquo;</button>
      <span class="cal-week-label" id="weekLabel"></span>
      <button onclick="changeWeek(1)">&rsaquo;</button>
    </div>
  </div>

  <div class="card">
    <div class="cal-grid" id="calGrid">
      <div class="cal-head">日</div><div class="cal-head">一</div><div class="cal-head">二</div>
      <div class="cal-head">三</div><div class="cal-head">四</div><div class="cal-head">五</div><div class="cal-head">六</div>
    </div>

  <div class="day-detail" id="dayDetail">
    <div class="empty-state">

</div>

     Page: Badges
═══════════════════════════════════════════ -->
<div class="page" id="page-badges">

</div>

<!-- ═══════════════════════════════════════════
     Page: Stats
═══════════════════════════════════════════ -->
<div class="page" id="page-stats">
  <div class="page-title-row">
    <h2>📊 我的统计</h2>
  </div>

  <div class="stats-hero">
    <div class="stats-hero-label">累计训练数据</div>
    <div class="stats-hero-grid">
      <div class="stat-box"><span class="s-val" id="totalSessions">0</span><span class="s-lbl">训练次数</span></div>
      <div class="stat-box"><span class="s-val" id="totalMins">0</span><span class="s-lbl">总训练(分钟)</span></div>
      <div class="stat-box"><span class="s-val" id="avgMins">0</span><span class="s-lbl">平均时长</span></div>
      <div class="stat-box"><span class="s-val" id="totalCounts">0</span><span class="s-lbl">累计次数</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🏅 项目排行榜</div>
    <div class="rank-list" id="rankList"></div>
  </div>

  <div class="card">
    <div class="card-title">📤 数据导出</div>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:10px">导出所有训练记录</p>
    <button class="btn-export" onclick="exportCSV()">📥 导出 CSV</button>
  </div>
</div>

     Bottom Nav
═══════════════════════════════════════════ -->
<div class="bottom-nav">
  <button class="nav-item active" data-page="train" onclick="switchTab('train')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span>训练</span>
  </button>

    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>历史</span>
  </button>
  <button class="nav-item" data-page="badges" onclick="switchTab('badges')">
    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    <span>徽章</span>
  </button>
  <button class="nav-item" data-page="stats" onclick="switchTab('stats')">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>统计</span>
  </button>
</div>

<!-- ── Toast ─────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// Constants
// ═══════════════════════════════════════════
const ITEMS=['shoot','pass','dribble','catch','header'];
const ITEM_NAMES={shoot:'射门',pass:'传球',dribble:'带球绕桩',catch:'接球',header:'头球'};
const ITEM_ICONS={shoot:'⚽',pass:'🎯',dribble:'🏃',catch:'🧤',header:'🗣'};

const BADGES=[
  {id:'first',name:'初次登场',desc:'完成第一次训练',icon:'🌟',cond:d=>d.sessions.length>=1},
  {id:'streak3',name:'连练3天',desc:'连续训练3天',icon:'🔥',cond:d=>d.streak>=3},
  {id:'streak7',name:'坚持不懈',desc:'连续训练7天',icon:'💪',cond:d=>d.streak>=7},
  {id:'shoot20',name:'射门达人',desc:'累计射门20次',icon:'⚽',cond:d=>totalOf(d,'shoot')>=20},
  {id:'pass30',name:'传球高手',desc:'累计传球30次',icon:'🎯',cond:d=>totalOf(d,'pass')>=30},
  {id:'total100',name:'百次训练',desc:'累计训练100次',icon:'💯',cond:d=>totalCounts(d)>=100},
  {id:'shoot50',name:'射门猛将',desc:'累计射门50次',icon:'🥅',cond:d=>totalOf(d,'shoot')>=50},
  {id:'shoot100',name:'射手王',desc:'累计射门100次',icon:'👑',cond:d=>totalOf(d,'shoot')>=100},
  {id:'sessions10',name:'常客',desc:'完成10次训练',icon:'🏠',cond:d=>d.sessions.length>=10},
  {id:'sessions30',name:'老将',desc:'完成30次训练',icon:'🎖',cond:d=>d.sessions.length>=30},
  {id:'all5',name:'全能球员',desc:'5个项目都有过记录',icon:'🌈',cond:d=>ITEMS.every(i=>totalOf(d,i)>0)},
  {id:'week5',name:'周冠军',desc:'单周训练5次',icon:'🏆',cond:d=>{const w=weekSessions(d,getWeekStart());return w>=5}},
];

// ═══════════════════════════════════════════
// State
// ═══════════════════════════════════════════
let state=load();
let calWeekStart=getWeekStart();
let timerInterval=null,timerSeconds=0,isTimerRunning=false;
let currentSession={items:{shoot:0,pass:0,dribble:0,catch:0,header:0},duration:0};

function newUserData(){return{sessions:[],badges:[],streak:0,lastTrainDate:null}}

// ═══════════════════════════════════════════
// Storage
// ═══════════════════════════════════════════
function load(){
  try{const d=JSON.parse(localStorage.getItem('football_trainer_v1'));if(d)return d}catch(e){}
  return newUserData();
}
function save(){localStorage.setItem('football_trainer_v1',JSON.stringify(state))}

// Dark mode
function toggleDark(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',isDark?'':'dark');
  localStorage.setItem('theme',isDark?'light':'dark');
}
(function(){if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark')})();

// ═══════════════════════════════════════════
// Timer
// ═══════════════════════════════════════════
function formatTime(s){const m=Math.floor(s/60),sec=s%60;return`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`}
function toggleTimer(){
  if(!isTimerRunning){
    isTimerRunning=true;
    document.getElementById('btnStart').textContent='⏹ 结束训练';
    document.getElementById('btnStart').classList.add('running');
    document.getElementById('timerLabel').textContent='训练中...';
    timerInterval=setInterval(()=>{
      timerSeconds++;
      document.getElementById('timerDisplay').textContent=formatTime(timerSeconds);
      currentSession.duration=timerSeconds;
    },1000);
  } else { endSession(); }
}
function endSession(){
  clearInterval(timerInterval);isTimerRunning=false;timerInterval=null;
  document.getElementById('btnStart').textContent='⚡ 开始训练';
  document.getElementById('btnStart').classList.remove('running');
  document.getElementById('timerLabel').textContent='点击按钮，计时本次训练';
  const totalCounts=ITEMS.reduce((s,i)=>s+currentSession.items[i],0);
  if(totalCounts===0&&timerSeconds<30){timerSeconds=0;document.getElementById('timerDisplay').textContent='00:00';return;}
  const session={id:Date.now(),date:new Date().toISOString().split('T')[0],duration:timerSeconds,items:{...currentSession.items}};
  state.sessions.push(session);updateStreak();checkBadges();save();
  toast('🎉 训练已保存！太棒了！','green');
  resetSession();refreshAll();
}

// ═══════════════════════════════════════════
// Counts
// ═══════════════════════════════════════════
function addCount(item){
  if(!isTimerRunning){toast('请先开始训练！','gold');return;}
  currentSession.items[item]++;
  const el=document.getElementById('cnt-'+item);
  el.textContent=currentSession.items[item];
  el.classList.remove('zero','bounce');void el.offsetWidth;el.classList.add('bounce');
  document.getElementById('sc-'+item).textContent=currentSession.items[item];
  playBeep();
}
function playBeep(){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator();const gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=880;gain.gain.setValueAtTime(0.25,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);osc.start();osc.stop(ctx.currentTime+0.12)}catch(e){}
}
function resetSession(){
  timerSeconds=0;document.getElementById('timerDisplay').textContent='00:00';
  currentSession={items:{shoot:0,pass:0,dribble:0,catch:0,header:0},duration:0};
  ITEMS.forEach(i=>{const el=document.getElementById('cnt-'+i);el.textContent='0';el.classList.add('zero');document.getElementById('sc-'+i).textContent='0'});
}

// ═══════════════════════════════════════════
// Streak
// ═══════════════════════════════════════════
function updateStreak(){
  const today=new Date().toISOString().split('T')[0];
  const yesterday=new Date(Date.now()-86400000).toISOString().split('T')[0];
  const last=state.lastTrainDate;
  if(last===today)return;
  if(last===yesterday||!last){state.streak=last===yesterday?state.streak+1:1;}
  else{state.streak=1;}
  state.lastTrainDate=today;
}

// ═══════════════════════════════════════════
// Badges
// ═══════════════════════════════════════════
function checkBadges(){
  BADGES.forEach(b=>{
    if(!state.badges.includes(b.id)&&b.cond(state)){
      state.badges.push(b.id);
      setTimeout(()=>toast(`${b.icon} 获得：${b.name}`,'gold'),500);
    }
  });
}

// ═══════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════
const totalOf=(d,item)=>d.sessions.reduce((s,sn)=>s+(sn.items[item]||0),0);
const totalCounts=(d)=>ITEMS.reduce((s,i)=>s+totalOf(d,i),0);
function getWeekStart(d){
  d=d||new Date();const day=d.getDay();
  const diff=d.getDate()-day+(day===0?-6:1);
  const monday=new Date(d.setDate(diff));monday.setHours(0,0,0,0);
  return monday.toISOString().split('T')[0];
}
const weekSessions=(d,w)=>{const end=new Date(w);end.setDate(end.getDate()+6);const endStr=end.toISOString().split('T')[0];return d.sessions.filter(s=>s.date>=w&&s.date<=endStr).length};
const sessionsOfDate=(d,date)=>d.sessions.filter(s=>s.date===date);

// ═══════════════════════════════════════════
// Tab Switching
// ═══════════════════════════════════════════
function switchTab(page){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===page));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id==='page-'+page));
  if(page==='history')renderCalendar(calWeekStart);
  if(page==='badges')renderBadges();
  if(page==='stats')renderStats();
}

// ═══════════════════════════════════════════
// Calendar
// ═══════════════════════════════════════════
function changeWeek(delta){
  const d=new Date(calWeekStart);d.setDate(d.getDate()+delta*7);
  calWeekStart=getWeekStart(d);renderCalendar(calWeekStart);
}
function renderCalendar(weekStart){
  const d=new Date(weekStart);d.setHours(0,0,0,0);
  const end=new Date(d);end.setDate(end.getDate()+6);
  document.getElementById('weekLabel').textContent=`${d.getMonth()+1}/${d.getDate()} - ${end.getMonth()+1}/${end.getDate()}`;
  const grid=document.getElementById('calGrid');
  // remove old day els (keep heads)
  grid.querySelectorAll('.cal-day').forEach(e=>e.remove());
  for(let i=0;i<7;i++){
    const dd=new Date(d);dd.setDate(dd.getDate()+i);
    const dateStr=dd.toISOString().split('T')[0];
    const today=new Date().toISOString().split('T')[0];
    const isFuture=dd>new Date();
    const hasTrain=state.sessions.some(s=>s.date===dateStr);
    const isToday=dateStr===today;
    const el=document.createElement('div');
    el.className='cal-day'+(hasTrain?' has-train':'')+(isToday&&!hasTrain?' today':'')+(isFuture?' future':(!hasTrain&&!isToday?' empty':''));
    el.innerHTML=`<span class="cd-num">${dd.getDate()}</span><span class="cd-dot"></span>`;
    if(!isFuture)el.addEventListener('click',()=>showDayDetail(dateStr));
    grid.appendChild(el);
  }
}
function showDayDetail(dateStr){
  const sessions=sessionsOfDate(state,dateStr);
  const detail=document.getElementById('dayDetail');
  if(!sessions.length){detail.innerHTML=`<div class="empty-state"><span class="es-icon">📅</span><p>${dateStr} 没有训练记录</p></div>`;return;}
  const totalDur=sessions.reduce((s,ss)=>s+ss.duration,0);
  const totalCnt=sessions.reduce((s,ss)=>s+ITEMS.reduce((a,i)=>a+(ss.items[i]||0),0),0);
  const mins=Math.round(totalDur/60);
  let html=`<div class="card"><div class="card-title">${dateStr}</div>`;
  html+=`<div class="day-stat-row"><span class="dsr-label"><span class="dsr-icon">🏋️</span> 训练场次</span><span class="dsr-val">${sessions.length}次</span></div>`;
  html+=`<div class="day-stat-row"><span class="dsr-label"><span class="dsr-icon">⏱</span> 总时长</span><span class="dsr-val">${mins}分钟</span></div>`;
  html+=`<div class="day-stat-row"><span class="dsr-label"><span class="dsr-icon">⚽</span> 总次数</span><span class="dsr-val">${totalCnt}次</span></div>`;
  ITEMS.forEach(i=>{const tot=sessions.reduce((s,ss)=>s+(ss.items[i]||0),0);if(tot>0)html+=`<div class="day-stat-row"><span class="dsr-label"><span class="dsr-icon">${ITEM_ICONS[i]}</span> ${ITEM_NAMES[i]}</span><span class="dsr-val">${tot}次</span></div>`;});
  html+=`</div>`;
  detail.innerHTML=html;
}

// ═══════════════════════════════════════════
// Badges
// ═══════════════════════════════════════════
function renderBadges(){
  const earned=state.badges;const total=BADGES.length;
  document.getElementById('badgeProgress').textContent=`${earned.length}/${total} 已获得`;
  const grid=document.getElementById('badgeGrid');grid.innerHTML='';
  BADGES.forEach(b=>{
    const isEarned=earned.includes(b.id);
    const el=document.createElement('div');
    el.className='badge-card'+(isEarned?' earned':' locked');
    el.innerHTML=`${isEarned?'':'<span class="badge-lock">🔒</span>'}<span class="badge-icon">${b.icon}</span><span class="badge-name">${b.name}</span><span class="badge-desc">${b.desc}</span>`;
    if(isEarned)el.classList.add('pop');
    grid.appendChild(el);
  });
}

// ═══════════════════════════════════════════
// Stats
// ═══════════════════════════════════════════
function renderStats(){
  const total=state.sessions.length;
  const totalSec=state.sessions.reduce((s,ss)=>s+ss.duration,0);
  const totalMins=Math.round(totalSec/60);
  const avgMins=total>0?Math.round(totalMins/total):0;
  const totalCnt=totalCounts(state);
  document.getElementById('totalSessions').textContent=total;
  document.getElementById('totalMins').textContent=totalMins;
  document.getElementById('avgMins').textContent=avgMins;
  document.getElementById('totalCounts').textContent=totalCnt;
  const ranks=ITEMS.map(i=>({item:i,name:ITEM_NAMES[i],icon:ITEM_ICONS[i],count:totalOf(state,i)})).sort((a,b)=>b.count-a.count);
  const max=ranks[0].count||1;
  const list=document.getElementById('rankList');
  let html='';
  ranks.forEach((r,idx)=>{
    const pct=max>0?(r.count/max*100):0;
    const cls=idx===0?'r1':idx===1?'r2':idx===2?'r3':'rn';
    html+=`<div class="rank-row"><div class="rank-num ${cls}">${idx+1}</div><span class="rank-emoji">${r.icon}</span><div class="rank-info"><div class="rank-name">${r.name}</div><div class="rank-count">累计 ${r.count} 次</div></div><div class="rank-bar-wrap"><div class="rank-bar-fill" style="width:${pct}%"></div></div></div>`;
  });
  list.innerHTML=html;
}

// ═══════════════════════════════════════════
// CSV Export
// ═══════════════════════════════════════════
function exportCSV(){
  if(!state.sessions.length){toast('暂无记录可导出','gold');return;}
  const header=['日期','时长(秒)','时长(分钟)','射门','传球','带球绕桩','接球','头球','总计'];
  const rows=state.sessions.map(s=>{const total=ITEMS.reduce((a,i)=>a+(s.items[i]||0),0);return[s.date,s.duration,Math.round(s.duration/60),s.items.shoot||0,s.items.pass||0,s.items.dribble||0,s.items.catch||0,s.items.header||0,total]});
  const csv=[header,...rows].map(r=>r.join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`足球训练_${new Date().toISOString().split('T')[0]}.csv`;a.click();URL.revokeObjectURL(url);
  toast('导出成功！','green');
}

// ═══════════════════════════════════════════
// Toast
// ═══════════════════════════════════════════
function toast(msg,type='gold'){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;void t.offsetWidth;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ═══════════════════════════════════════════
// Refresh
// ═══════════════════════════════════════════
function refreshAll(){
  document.getElementById('streakNum').textContent=state.streak;
  if(state.sessions.length>0)setTimeout(()=>toast(`继续加油 💪 连续${state.streak}天`,'green'),800);
}

// ═══════════════════════════════════════════
// Init
// ═══════════════════════════════════════════
refreshAll();
</script>
</body>
</html>
